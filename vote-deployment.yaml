apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - image: rezy19/voting-app-vote:48ef75631ca6f09ea48fc7b29a173a50833e8f2e
        name: vote
        ports:
        - containerPort: 80
          name: vote
