apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vote
  name: vote
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
      - image: rezy19/voting-app-vote:7788582ee3dfc1d771e8212a7717e029cc1fb252
        name: vote
        ports:
        - containerPort: 80
          name: vote
