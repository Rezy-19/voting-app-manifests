apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: result
  name: result
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - image: rezy19/voting-app-result:48ef75631ca6f09ea48fc7b29a173a50833e8f2e
        name: result
        ports:
        - containerPort: 80
          name: result
